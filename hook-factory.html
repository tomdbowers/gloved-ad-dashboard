<style>
  @font-face {
    font-family: 'Larish Alte';
    src: url('assets/fonts/larish_alte_semibold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF8F6;
    --surface: #FFFFFF;
    --surface-hover: #EFEFE6;
    --border: rgba(71,71,41,0.10);
    --border-strong: rgba(71,71,41,0.18);
    --text: #474729;
    --text-dim: #787861;
    --text-muted: #989885;
    --accent: #C9B991;
    --accent-dark: #474729;
    --green: #5a7a52;
    --green-bg: rgba(90,122,82,0.08);
    --red: #a04040;
    --red-bg: rgba(160,64,64,0.06);
    --orange: #96843a;
    --blue: #4a6a5c;
    --purple: #606046;
    --sage: #989885;
    --light-sage: #B7B7A8;
    --pale-sage: #D3D3C7;
    --off-white: #EFEFE6;
    --gold: #C9B991;
    --bottle-green: #474729;
    --dark-green: #606046;
    --olive: #787861;
  }

  body {
    font-family: 'Apta', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* ─── SITE NAV ─── */
  .site-nav {
    background: var(--bottle-green);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    font-family: 'Apta', sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
  }
  .site-nav a {
    color: var(--off-white);
    text-decoration: none;
    padding: 12px 20px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .site-nav a:hover { color: var(--gold); }
  .site-nav a.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    font-weight: 600;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-logo { height: 32px; width: auto; }
  .header-divider { width: 1px; height: 28px; background: var(--pale-sage); }
  .header-title {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
  }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .data-date-label {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--off-white);
    padding: 6px 14px;
    border-radius: 6px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .window-select {
    font-family: 'Apta', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: var(--off-white);
    border: 1px solid var(--border-strong);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

  /* ─── OVERVIEW BAR ─── */
  .overview-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .overview-stat {
    flex: 1;
    min-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  /* ─── METHODOLOGY BOX ─── */
  .method-box {
    background: var(--off-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
  }
  .method-box strong { color: var(--text); font-weight: 600; }
  .method-box code {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11.5px;
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ─── PARALLEL LISTS ─── */
  .lists-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }
  .list-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .list-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .list-header h3 {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .list-header .list-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--off-white);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Table rows */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: 10px 12px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    white-space: nowrap;
  }
  .rank-table th:first-child { padding-left: 20px; width: 36px; }
  .rank-table th.num { text-align: right; }
  .rank-table td {
    font-size: 12.5px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table td:first-child { padding-left: 20px; }
  .rank-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .rank-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--off-white);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .rank-num.top3 { background: var(--gold); color: #fff; }

  .ad-name-cell {
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
    color: var(--text);
  }
  .ad-tag-cell {
    font-size: 10px;
    color: var(--text-muted);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .metric-bad { color: var(--red); font-weight: 600; }
  .metric-good { color: var(--green); font-weight: 600; }
  .metric-neutral { color: var(--text); }
  .metric-score {
    font-weight: 700;
    font-size: 13px;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .footer::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--pale-sage);
    margin: 0 auto 16px;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .lists-split { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .overview-bar { flex-direction: column; }
    .overview-stat { min-width: auto; }
    .header { flex-direction: column; }
    .rank-table th, .rank-table td { padding: 8px 8px; font-size: 11px; }
    .ad-name-cell { max-width: 120px; }
  }

  /* ─── PRINT ─── */
  @media print {
    .site-nav { display: none; }
    body { background: #fff; }
    .container { max-width: 100%; padding: 16px; }
  }
</style>
</head>

// ═══════════════════════════════════════════════════
// MERGE DUPLICATE CREATIVES
// ═══════════════════════════════════════════════════
function mergeKey(name) {
  return name
    .replace(/[\u2018\u2019']/g, "'")
    .replace(/\s*off\s*['"\u2019]?\s*$/i, '')
    .replace(/['"\s]+$/g, '')
    .trim()
    .toLowerCase();
}

function parsePlayTime(t) {
  if (!t || t === 'N/A') return 0;
  const p = t.split(':');
  return parseInt(p[0]) * 60 + parseInt(p[1]);
}

function fmtPlayTime(sec) {
  if (sec <= 0) return 'N/A';
  return String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(Math.round(sec % 60)).padStart(2, '0');
}

function mergeAds(ads) {
  const groups = {};
  ads.forEach(ad => {
    const key = mergeKey(ad.name);
    if (!groups[key]) {
      groups[key] = { ...ad, _tags: [ad.tag], _count: 1 };
    } else {
      const g = groups[key];
      const oldViews = g.threeSecViews;
      const oldSec = parsePlayTime(g.avgPlayTime) * oldViews;
      const newSec = parsePlayTime(ad.avgPlayTime) * ad.threeSecViews;
      g.spend += ad.spend;
      g.impressions += ad.impressions;
      g.clicks += ad.clicks;
      g.linkClicks += ad.linkClicks;
      g.purchases += ad.purchases;
      g.purchaseValue += ad.purchaseValue;
      g.threeSecViews += ad.threeSecViews;
      g.thruPlays += ad.thruPlays;
      g.completions += ad.completions;
      g.avgPlayTime = g.threeSecViews > 0 ? fmtPlayTime((oldSec + newSec) / g.threeSecViews) : 'N/A';
      g.roas = g.spend > 0 ? g.purchaseValue / g.spend : 0;
      g.ctr = g.impressions > 0 ? (g.clicks / g.impressions * 100) : 0;
      g.isVideo = g.isVideo || ad.isVideo;
      g._tags.push(ad.tag);
      g._count++;
    }
  });
  return Object.values(groups).map(g => {
    const markets = [...new Set(g._tags.map(t => t.split(' \u00b7 ')[0].trim()))];
    const strategies = [...new Set(g._tags.map(t => {
      const parts = t.split(' \u00b7 ');
      return parts.length > 1 ? parts[1].trim() : '';
    }).filter(Boolean))];
    g.tag = markets.join('+') + ' \u00b7 ' + strategies.join('+');
    if (g._count > 1) g.tag += ` (${g._count} merged)`;
    delete g._tags;
    delete g._count;
    return g;
  });
}

// ═══════════════════════════════════════════════════
// WINDOW CONFIG & RENDER ENTRY POINT
// ═══════════════════════════════════════════════════
const WINDOW_CFG = {
  '30': { minSpend: 80,  label: 'Last 30 Days' },
  '90': { minSpend: 80,  label: 'Last 90 Days' },
  'all': { minSpend: 80, label: 'All Time' },
};

let currentWindow = '30';

function renderDashboard(windowKey) {
  currentWindow = windowKey;
  const ADS = ADS_BY_WINDOW[windowKey] || ADS_BY_WINDOW['30'] || [];
  const cfg = WINDOW_CFG[windowKey];
  const MERGED_ADS = mergeAds(ADS);
  const MIN_SPEND = cfg.minSpend;
  const DATE_LABEL = cfg.label;

  // ─── Metric helpers ───
  function hookRate(ad) {
    return ad.impressions > 0 ? (ad.threeSecViews / ad.impressions * 100) : 0;
  }
  function holdRate(ad) {
    return ad.threeSecViews > 0 ? (ad.thruPlays / ad.threeSecViews * 100) : 0;
  }
  function ctrPerView(ad) {
    return ad.threeSecViews > 0 ? (ad.linkClicks / ad.threeSecViews * 100) : 0;
  }
  function fmt(n, d = 2) { return n.toFixed(d); }
  function fmtNum(n) { return n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

  // ─── Filter to video ads with sufficient data ───
  // Exclude sub-7-second ads (animated GIFs / short loops — not real hook-swappable videos)
  const videoAds = MERGED_ADS.filter(a =>
    a.spend >= MIN_SPEND &&
    a.isVideo &&
    a.impressions >= 1000 &&
    a.threeSecViews >= 100 &&
    parsePlayTime(a.avgPlayTime) >= 7
  );

  // ─── Compute median hold rate ───
  const holdRates = videoAds.map(a => holdRate(a)).sort((a, b) => a - b);
  const medianHold = holdRates.length > 0
    ? holdRates[Math.floor(holdRates.length / 2)]
    : 0;

  // ─── Hook Opportunity Score ───
  // Filter candidates: hold rate above median (strong content, weak hook)
  const candidates = videoAds.filter(a => holdRate(a) >= medianHold);

  // Compute normalised hook rate (0-1 scale)
  const hookRates = candidates.map(a => hookRate(a));
  const minHook = Math.min(...hookRates);
  const maxHook = Math.max(...hookRates);
  const hookRange = maxHook - minHook;

  function normHook(ad) {
    if (hookRange === 0) return 0.5;
    return (hookRate(ad) - minHook) / hookRange;
  }

  function hookScore(ad) {
    const hold = holdRate(ad) / 100;
    const ctr = ctrPerView(ad) / 100;
    const invHook = 1 - normHook(ad);
    return hold * ctr * invHook;
  }

  // Rank by hook opportunity score (highest = best swap candidate)
  const swapCandidates = [...candidates]
    .map(ad => ({ ...ad, _score: hookScore(ad) }))
    .sort((a, b) => b._score - a._score)
    .slice(0, 20);

  // Best hook rates (inspiration) — all qualifying video ads, not just above-median hold
  const bestHooks = [...videoAds]
    .sort((a, b) => hookRate(b) - hookRate(a))
    .slice(0, 20);

  // ─── Overview stats ───
  const avgHook = videoAds.length > 0
    ? videoAds.reduce((s, a) => s + hookRate(a), 0) / videoAds.length : 0;
  const avgCtrView = videoAds.length > 0
    ? videoAds.reduce((s, a) => s + ctrPerView(a), 0) / videoAds.length : 0;

  // ─── Render table rows ───
  function swapRow(ad, i) {
    return `<tr>
      <td><span class="rank-num ${i < 3 ? 'top3' : ''}">${i + 1}</span></td>
      <td class="ad-name-cell" title="${ad.fullName || ad.name}">${ad.name}</td>
      <td class="ad-tag-cell" title="${ad.tag}">${ad.tag}</td>
      <td class="num metric-score">${ad._score.toFixed(4)}</td>
      <td class="num metric-bad">${fmt(hookRate(ad), 1)}%</td>
      <td class="num metric-good">${fmt(holdRate(ad), 1)}%</td>
      <td class="num metric-neutral">${fmt(ctrPerView(ad), 2)}%</td>
    </tr>`;
  }

  function hookRow(ad, i) {
    return `<tr>
      <td><span class="rank-num ${i < 3 ? 'top3' : ''}">${i + 1}</span></td>
      <td class="ad-name-cell" title="${ad.fullName || ad.name}">${ad.name}</td>
      <td class="ad-tag-cell" title="${ad.tag}">${ad.tag}</td>
      <td class="num metric-good" style="font-weight:700">${fmt(hookRate(ad), 1)}%</td>
      <td class="num metric-neutral">${fmt(holdRate(ad), 1)}%</td>
      <td class="num metric-neutral">${fmt(ctrPerView(ad), 2)}%</td>
    </tr>`;
  }

  // ─── Build HTML ───
  const windowOptions = Object.entries(WINDOW_CFG).map(([k, v]) =>
    `<option value="${k}" ${k === windowKey ? 'selected' : ''}>${v.label}</option>`
  ).join('');

  const swapRows = swapCandidates.length > 0
    ? swapCandidates.map((ad, i) => swapRow(ad, i)).join('')
    : `<tr><td colspan="7" class="empty-state">No candidates found \u2014 try a longer time window</td></tr>`;

  const hookRows = bestHooks.length > 0
    ? bestHooks.map((ad, i) => hookRow(ad, i)).join('')
    : `<tr><td colspan="6" class="empty-state">No qualifying video ads found</td></tr>`;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <img src="assets/gloved-logo.png" alt="Gloved" class="header-logo">
        <div class="header-divider"></div>
        <h1 class="header-title">Hook Factory</h1>
      </div>
      <div class="header-right">
        <div class="data-date-label">\ud83c\udfa3 ${DATE_LABEL}</div>
        <select class="window-select" onchange="renderDashboard(this.value)">
          ${windowOptions}
        </select>
      </div>
    </div>

    <div class="overview-bar">
      <div class="overview-stat">
        <div class="stat-value">${videoAds.length}</div>
        <div class="stat-label">Video Ads Analyzed</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${swapCandidates.length}</div>
        <div class="stat-label">Hook Swap Candidates</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${fmt(avgHook, 1)}%</div>
        <div class="stat-label">Avg Hook Rate</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${fmt(medianHold, 1)}%</div>
        <div class="stat-label">Median Hold Rate</div>
      </div>
      <div class="overview-stat">
        <div class="stat-value">${fmt(avgCtrView, 2)}%</div>
        <div class="stat-label">Avg CTR / View</div>
      </div>
    </div>

    <div class="method-box">
      <strong>How it works:</strong> We identify video ads with strong content (high hold rate, good CTR per view)
      but a weak opening hook. These are prime candidates for a <strong>hook swap</strong> \u2014 the creative already converts
      once people watch, so a better hook could unlock significantly more reach.<br><br>
      <strong>Score</strong> = <code>Hold Rate \u00d7 CTR/View \u00d7 (1 \u2212 Normalised Hook Rate)</code><br>
      Minimum thresholds: \u22657 s average play time, \u22651,000 impressions, \u2265100 three-second views, hold rate above account median.
    </div>

    <div class="lists-split">
      <div class="list-panel">
        <div class="list-header">
          <h3>\ud83d\udd04 Hook Swap Candidates</h3>
          <span class="list-count">Top ${swapCandidates.length}</span>
        </div>
        <table class="rank-table">
          <thead><tr>
            <th>#</th><th>Ad Name</th><th>Tag</th>
            <th class="num">Score</th><th class="num">Hook</th>
            <th class="num">Hold</th><th class="num">CTR/View</th>
          </tr></thead>
          <tbody>${swapRows}</tbody>
        </table>
      </div>

      <div class="list-panel">
        <div class="list-header">
          <h3>\u2b50 Best Hook Rates</h3>
          <span class="list-count">Top ${bestHooks.length}</span>
        </div>
        <table class="rank-table">
          <thead><tr>
            <th>#</th><th>Ad Name</th><th>Tag</th>
            <th class="num">Hook</th><th class="num">Hold</th>
            <th class="num">CTR/View</th>
          </tr></thead>
          <tbody>${hookRows}</tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      Gloved \u00b7 Hook Factory \u00b7 ${DATE_LABEL}
    </div>
  `;
}

renderDashboard('30');
</script>
