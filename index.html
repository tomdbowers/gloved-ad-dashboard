<style>
  @font-face {

    src: url('assets/fonts/larish_alte_semibold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Apta';
    src: url('assets/fonts/apta-italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF8F6;
    --surface: #FFFFFF;
    --surface-hover: #EFEFE6;
    --border: rgba(71,71,41,0.10);
    --border-strong: rgba(71,71,41,0.18);
    --text: #474729;
    --text-dim: #787861;
    --text-muted: #989885;
    --accent: #C9B991;
    --accent-dark: #474729;
    --green: #5a7a52;
    --green-bg: rgba(90,122,82,0.08);
    --red: #a04040;
    --red-bg: rgba(160,64,64,0.06);
    --orange: #96843a;
    --blue: #4a6a5c;
    --purple: #606046;
    --sage: #989885;
    --light-sage: #B7B7A8;
    --pale-sage: #D3D3C7;
    --off-white: #EFEFE6;
    --gold: #C9B991;
    --bottle-green: #474729;
    --dark-green: #606046;
    --olive: #787861;
  }

  body {
    font-family: 'Apta', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-logo {
    height: 32px;
    width: auto;
  }
  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--pale-sage);
  }
  .header-text h1 {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--bottle-green);
  }
  .header-text .subtitle {
    color: var(--olive);
    font-size: 13px;
    margin-top: 3px;
    font-weight: 400;
  }
  .data-date-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Apta', sans-serif;
    text-align: right;
    padding-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .window-select {
    font-family: 'Apta', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--bottle-green);
    background: var(--cream);
    border: 1.5px solid var(--gold);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .window-select:hover,
  .window-select:focus {
    border-color: var(--bottle-green);
  }

  /* ─── OVERVIEW BAR ─── */
  .overview-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 44px;
  }
  .overview-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-align: center;
    position: relative;
  }
  .overview-stat::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--gold);
    border-radius: 1px;
  }
  .overview-stat .stat-value {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--bottle-green);
  }
  .overview-stat .stat-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--olive);
    margin-top: 4px;
  }

  /* ─── SECTIONS ─── */
  .section {
    margin-bottom: 52px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .section-icon.spend { background: rgba(201,185,145,0.18); }
  .section-icon.hook { background: rgba(71,71,41,0.08); }
  .section-icon.hold { background: rgba(96,96,70,0.10); }
  .section-icon.conv { background: rgba(90,122,82,0.10); }

  .section-title {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--bottle-green);
    letter-spacing: 0.2px;
  }
  .section-desc {
    font-size: 12px;
    color: var(--olive);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* ─── CARD GRID ─── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 1100px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    transition: all 0.2s ease;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(71,71,41,0.08);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 10px 10px 0 0;
  }
  .card.rank-1::before { background: linear-gradient(90deg, #C9B991, #a89860); }
  .card.rank-2::before { background: linear-gradient(90deg, #B7B7A8, #D3D3C7); }
  .card.rank-3::before { background: linear-gradient(90deg, #989885, #B7B7A8); }
  .card.rank-4::before,
  .card.rank-5::before,
  .card.rank-6::before,
  .card.rank-7::before,
  .card.rank-8::before { background: var(--border); }

  .card.worst::before { background: linear-gradient(90deg, #a04040, #c06060); }
  .card.best::before { background: linear-gradient(90deg, #5a7a52, #7a9a6a); }

  .card-rank {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    background: var(--off-white);
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--bottle-green);
    margin-bottom: 2px;
    padding-right: 30px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tag {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 14px;
  }

  .card-metric {
    font-family: 'Larish Alte', Georgia, serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 14px;
  }
  .card-metric.spend-color { color: var(--bottle-green); }
  .card-metric.hook-color { color: var(--dark-green); }
  .card-metric.hold-color { color: var(--dark-green); }
  .card-metric.conv-good { color: var(--green); }
  .card-metric.conv-bad { color: var(--red); }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .card-stats.three-col {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .mini-stat {
    background: var(--off-white);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .mini-stat .ms-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--bottle-green);
  }
  .mini-stat .ms-label {
    font-size: 9px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── CONVERSION SPLIT ─── */
  .conv-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 900px) { .conv-split { grid-template-columns: 1fr; } }

  .conv-group h3 {
    font-family: 'Apta', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--bottle-green);
  }
  .conv-group h3 .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .conv-group h3 .dot.green { background: var(--green); }
  .conv-group h3 .dot.red { background: var(--red); }

  .conv-group .card-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  @media (max-width: 600px) { .conv-group .card-grid { grid-template-columns: 1fr; } }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 28px 24px;
    color: var(--text-muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    letter-spacing: 0.3px;
  }
  .footer .gold-line {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 14px;
    border-radius: 1px;
  }

  /* ─── WHAT-TO-DO LABELS ─── */
  .insight-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: auto;
  }
  .insight-badge.iterate { background: rgba(71,71,41,0.08); color: var(--dark-green); }
  .insight-badge.scale { background: rgba(90,122,82,0.08); color: var(--green); }
  .insight-badge.cut { background: rgba(160,64,64,0.08); color: var(--red); }

  /* ─── ITERATION OPPORTUNITIES ─── */
  .section-icon.iterate { background: rgba(201,185,145,0.15); }
  .opp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 14px;
  }
  .opp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    border-left: 4px solid var(--sage);
    transition: box-shadow .15s;
  }
  .opp-card:hover { box-shadow: 0 2px 12px rgba(71,71,41,0.08); }
  .opp-card.fix-middle   { border-left-color: var(--orange); }
  .opp-card.new-hook     { border-left-color: var(--blue); }
  .opp-card.high-spend-fix { border-left-color: var(--red); }
  .opp-card.unlock-scale { border-left-color: var(--green); }
  .opp-card.extend-winner { border-left-color: var(--gold); }
  .opp-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .opp-badge {
    font-size: 10px;
    font-weight: 700;
    font-family: 'Apta', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .opp-badge.fix-middle   { background: rgba(150,132,58,0.12); color: var(--orange); }
  .opp-badge.new-hook     { background: rgba(74,106,92,0.12); color: var(--blue); }
  .opp-badge.high-spend-fix { background: rgba(160,64,64,0.10); color: var(--red); }
  .opp-badge.unlock-scale { background: rgba(90,122,82,0.12); color: var(--green); }
  .opp-badge.extend-winner { background: rgba(201,185,145,0.18); color: #8a7a50; }
  .opp-name {
    font-family: 'Apta', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .opp-tag {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'Apta', sans-serif;
  }
  .opp-brief {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.55;
    margin-bottom: 12px;
    font-family: 'Apta', sans-serif;
  }
  .opp-metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .opp-metric {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Apta', sans-serif;
  }
  .opp-metric strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ─── PRINT / PDF EXPORT ─── */
  @media print {
    @page {
      size: A4 portrait;
      margin: 12mm 10mm;
    }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff; }
    .container { max-width: 100%; padding: 0; }
    .header { padding: 16px 0 12px; }
    .header-logo { height: 28px; }
    .data-date-label { font-size: 10px; }
    .overview-bar { gap: 8px; margin-bottom: 16px; }
    .overview-stat { padding: 10px 12px; }
    .stat-value { font-size: 22px; }
    .stat-label { font-size: 9px; }

    .section { padding: 16px 0; break-inside: avoid; }
    .section-title { font-size: 16px; }
    .section-desc { font-size: 10px; }

    /* Opportunity cards — single column, compact */
    .opp-grid { grid-template-columns: 1fr; gap: 8px; }
    .opp-card { padding: 12px 14px; break-inside: avoid; }
    .opp-badge { font-size: 8px; padding: 2px 6px; }
    .opp-name { font-size: 11px; }
    .opp-brief { font-size: 10px; margin-bottom: 8px; }
    .opp-metrics { gap: 10px; }
    .opp-metric { font-size: 9px; }

    /* Ad cards — keep 2-col but tighter */
    .card-grid { gap: 8px; }
    .card { padding: 12px; break-inside: avoid; }
    .card-name { font-size: 11px; }
    .card-tag { font-size: 9px; }
    .card-metric { font-size: 22px; }
    .mini-stat { font-size: 9px; }
    .card-rank { font-size: 10px; width: 22px; height: 22px; }

    /* Page breaks between major sections */
    .section:nth-child(n+3) { break-before: auto; }
    .section + .section { page-break-before: auto; }

    /* Footer */
    .footer { padding: 10px 0; font-size: 9px; }
    .footer::before { margin-bottom: 8px; }
  }
</style>

// ═══════════════════════════════════════════════════
// MERGE DUPLICATE CREATIVES
// ═══════════════════════════════════════════════════
function mergeKey(name) {
  return name
    .replace(/[\u2018\u2019']/g, "'")
    .replace(/\s*off\s*['"\u2019]?\s*$/i, '')
    .replace(/['"\s]+$/g, '')
    .trim()
    .toLowerCase();
}

function parsePlayTime(t) {
  if (!t || t === 'N/A') return 0;
  const p = t.split(':');
  return parseInt(p[0]) * 60 + parseInt(p[1]);
}

function fmtPlayTime(sec) {
  if (sec <= 0) return 'N/A';
  return String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(Math.round(sec % 60)).padStart(2, '0');
}

function mergeAds(ads) {
  const groups = {};
  ads.forEach(ad => {
    const key = mergeKey(ad.name);
    if (!groups[key]) {
      groups[key] = { ...ad, _tags: [ad.tag], _count: 1 };
    } else {
      const g = groups[key];
      const oldViews = g.threeSecViews;
      const oldSec = parsePlayTime(g.avgPlayTime) * oldViews;
      const newSec = parsePlayTime(ad.avgPlayTime) * ad.threeSecViews;
      g.spend += ad.spend;
      g.impressions += ad.impressions;
      g.clicks += ad.clicks;
      g.linkClicks += ad.linkClicks;
      g.purchases += ad.purchases;
      g.purchaseValue += ad.purchaseValue;
      g.threeSecViews += ad.threeSecViews;
      g.thruPlays += ad.thruPlays;
      g.completions += ad.completions;
      g.avgPlayTime = g.threeSecViews > 0 ? fmtPlayTime((oldSec + newSec) / g.threeSecViews) : 'N/A';
      g.roas = g.spend > 0 ? g.purchaseValue / g.spend : 0;
      g.ctr = g.impressions > 0 ? (g.clicks / g.impressions * 100) : 0;
      g.isVideo = g.isVideo || ad.isVideo;
      g._tags.push(ad.tag);
      g._count++;
    }
  });
  return Object.values(groups).map(g => {
    const markets = [...new Set(g._tags.map(t => t.split(' \u00b7 ')[0].trim()))];
    const strategies = [...new Set(g._tags.map(t => {
      const parts = t.split(' \u00b7 ');
      return parts.length > 1 ? parts[1].trim() : '';
    }).filter(Boolean))];
    g.tag = markets.join('+') + ' \u00b7 ' + strategies.join('+');
    if (g._count > 1) g.tag += ` (${g._count} merged)`;
    delete g._tags;
    delete g._count;
    return g;
  });
}

function hookRate(ad) {
  return ad.impressions > 0 ? (ad.threeSecViews / ad.impressions * 100) : 0;
}
function holdRate(ad) {
  return ad.threeSecViews > 0 ? (ad.thruPlays / ad.threeSecViews * 100) : 0;
}
function convRate(ad) {
  return ad.linkClicks > 0 ? (ad.purchases / ad.linkClicks * 100) : 0;
}
function fmt(n, decimals = 2) {
  return n.toFixed(decimals);
}
function fmtNum(n) {
  return n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtCurrency(n) {
  return '\u00a3' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtBigCurrency(n) {
  if (n >= 1000) return '\u00a3' + (n/1000).toFixed(1) + 'k';
  return '\u00a3' + n.toFixed(0);
}

// ITERATION OPPORTUNITY ANALYSIS
// ═══════════════════════════════════════════════════
function analyzeOpportunities() {
  const ads = qualifiedAds.filter(a => a.isVideo && a.threeSecViews > 50);
  if (ads.length < 3) return [];

  const avgHook = ads.reduce((s, a) => s + hookRate(a), 0) / ads.length;
  const avgHold = ads.reduce((s, a) => s + holdRate(a), 0) / ads.length;
  const totalLinkClicks = qualifiedAds.reduce((s, a) => s + a.linkClicks, 0);
  const totalPurch = qualifiedAds.reduce((s, a) => s + a.purchases, 0);
  const avgConv = totalLinkClicks > 0 ? (totalPurch / totalLinkClicks * 100) : 0;
  const spends = qualifiedAds.map(a => a.spend).sort((a, b) => a - b);
  const medSpend = spends[Math.floor(spends.length / 2)];
  const topQSpend = spends[Math.floor(spends.length * 0.75)];
  const totalRev = qualifiedAds.reduce((s, a) => s + a.purchaseValue, 0);
  const totalSp = qualifiedAds.reduce((s, a) => s + a.spend, 0);
  const avgRoasAll = totalSp > 0 ? totalRev / totalSp : 0;

  const opps = [];
  const seen = new Set();

  // 1) Good hook, bad hold → fix the middle
  ads.filter(a => hookRate(a) > avgHook && holdRate(a) < avgHold * 0.85)
    .sort((a, b) => b.spend - a.spend).slice(0, 3).forEach(ad => {
      if (seen.has(ad.name)) return; seen.add(ad.name);
      opps.push({ ad, type: 'fix-middle', label: 'Fix the Middle',
        brief: `Hook rate ${fmt(hookRate(ad),1)}% beats avg (${fmt(avgHook,1)}%) but hold drops to ${fmt(holdRate(ad),1)}% vs ${fmt(avgHold,1)}% avg. The opening grabs attention — the mid-section loses it. Tighten pacing or add a pattern interrupt around the 3-5s mark.`,
        priority: ad.spend * (avgHold - holdRate(ad)) / avgHold });
    });

  // 2) Bad hook, good hold → new hook needed
  ads.filter(a => hookRate(a) < avgHook * 0.85 && holdRate(a) > avgHold)
    .sort((a, b) => b.spend - a.spend).slice(0, 3).forEach(ad => {
      if (seen.has(ad.name)) return; seen.add(ad.name);
      opps.push({ ad, type: 'new-hook', label: 'New Hook Needed',
        brief: `Hold rate ${fmt(holdRate(ad),1)}% is strong (avg ${fmt(avgHold,1)}%) but hook is only ${fmt(hookRate(ad),1)}% vs ${fmt(avgHook,1)}% avg. The content works — people just aren't stopping. Test a new opening frame or first-second visual hook.`,
        priority: ad.spend * (avgHook - hookRate(ad)) / avgHook });
    });

  // 3) High spend, mediocre returns → high-spend fix
  qualifiedAds.filter(a => a.spend >= topQSpend && a.purchaseValue / a.spend < avgRoasAll * 0.9)
    .sort((a, b) => b.spend - a.spend).slice(0, 3).forEach(ad => {
      if (seen.has(ad.name)) return; seen.add(ad.name);
      const roas = ad.spend > 0 ? ad.purchaseValue / ad.spend : 0;
      opps.push({ ad, type: 'high-spend-fix', label: 'High Spend, Low Return',
        brief: `£${fmtNum(ad.spend)} spend (top quartile) but ${fmt(roas,1)}x ROAS vs ${fmt(avgRoasAll,1)}x avg. The algorithm is pushing this but returns aren't there. Review targeting or test a stronger CTA.`,
        priority: ad.spend * (avgRoasAll - roas) / avgRoasAll });
    });

  // 4) Strong conversion, low spend → ready to scale
  const convAds = qualifiedAds.filter(a => a.linkClicks >= 20);
  convAds.filter(a => convRate(a) > avgConv * 1.3 && a.spend < medSpend)
    .sort((a, b) => convRate(b) - convRate(a)).slice(0, 3).forEach(ad => {
      if (seen.has(ad.name)) return; seen.add(ad.name);
      opps.push({ ad, type: 'unlock-scale', label: 'Ready to Scale',
        brief: `${fmt(convRate(ad),1)}% conversion rate (avg ${fmt(avgConv,1)}%) on only £${fmtNum(ad.spend)} spend. This converts when it gets shown — it just isn't getting distribution. Consider increasing budget or broadening the audience.`,
        priority: (convRate(ad) / avgConv) * 100 });
    });

  // 5) Winner worth extending
  qualifiedAds.filter(a => a.spend >= topQSpend && a.purchaseValue / a.spend >= avgRoasAll)
    .sort((a, b) => b.purchaseValue / b.spend - a.purchaseValue / a.spend).slice(0, 2).forEach(ad => {
      if (seen.has(ad.name)) return; seen.add(ad.name);
      const roas = ad.spend > 0 ? ad.purchaseValue / ad.spend : 0;
      opps.push({ ad, type: 'extend-winner', label: 'Extend This Winner',
        brief: `${fmt(roas,1)}x ROAS at £${fmtNum(ad.spend)} spend — a proven performer. Create variations: test new thumbnails, tweak the CTA copy, or reshoot the intro to extend its lifespan before fatigue sets in.`,
        priority: ad.spend * roas });
    });

  return opps.sort((a, b) => b.priority - a.priority);
}
